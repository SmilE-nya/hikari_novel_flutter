name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.4.0-beta.4)'
        required: true
        type: string

jobs:
  setup:
    name: Setup tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve_tag.outputs.tag }}
      release_name: ${{ steps.resolve_tag.outputs.release_name }}

    steps:
      - name: Resolve tag name
        id: resolve_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.version }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_name=Hikari Novel $TAG" >> "$GITHUB_OUTPUT"

  build-android:
    name: Build Android
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: 'stable'
          cache: true

      - name: Decode keystore
        id: keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/hikari_novel.jks
            echo "keystore_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "keystore_available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create key.properties
        if: steps.keystore.outputs.keystore_available == 'true'
        shell: bash
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=../app/hikari_novel.jks" >> android/key.properties

      - name: Create debug key.properties (no production keystore)
        if: steps.keystore.outputs.keystore_available != 'true'
        shell: bash
        run: |
          keytool -genkey -v -keystore android/app/debug_ci.jks \
            -alias debug -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=CI, OU=CI, O=CI, L=CI, S=CI, C=CN"
          {
            echo "storePassword=android"
            echo "keyPassword=android"
            echo "keyAlias=debug"
            echo "storeFile=../app/debug_ci.jks"
          } > android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build split APKs (per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Build universal APK
        run: flutter build apk --release

      - name: Build App Bundle (AAB)
        run: flutter build appbundle --release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab

  release:
    name: Create Release
    needs: [setup, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Android build
        uses: actions/download-artifact@v4
        with:
          name: android-apks
          path: artifacts/android

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.tag }}
          name: ${{ needs.setup.outputs.release_name }}
          body: |
            ## Hikari Novel ${{ needs.setup.outputs.tag }}

            ### Android
            - `app-armeabi-v7a-release.apk` — 32-bit ARM 设备
            - `app-arm64-v8a-release.apk` — 64-bit ARM 设备（推荐）
            - `app-x86_64-release.apk` — x86_64 模拟器 / 设备
            - `app-release.apk` — 通用 APK（所有架构）
            - `app-release.aab` — Android App Bundle
          files: |
            artifacts/android/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
