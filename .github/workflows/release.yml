name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.4.0-beta.4)'
        required: true
        type: string

jobs:
  setup:
    name: Setup tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve_tag.outputs.tag }}
      release_name: ${{ steps.resolve_tag.outputs.release_name }}

    steps:
      - name: Resolve tag name
        id: resolve_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.version }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_name=Hikari Novel $TAG" >> "$GITHUB_OUTPUT"

  build-android:
    name: Build Android
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: 'stable'
          cache: true

      - name: Decode keystore
        id: keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/hikari_novel.jks
            echo "keystore_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "keystore_available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create key.properties
        if: steps.keystore.outputs.keystore_available == 'true'
        shell: bash
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=../app/hikari_novel.jks" >> android/key.properties

      - name: Create debug key.properties (no production keystore)
        if: steps.keystore.outputs.keystore_available != 'true'
        shell: bash
        run: |
          keytool -genkey -v -keystore android/app/debug_ci.jks \
            -alias debug -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=CI, OU=CI, O=CI, L=CI, S=CI, C=CN"
          {
            echo "storePassword=android"
            echo "keyPassword=android"
            echo "keyAlias=debug"
            echo "storeFile=../app/debug_ci.jks"
          } > android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build split APKs (per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Build universal APK
        run: flutter build apk --release

      - name: Build App Bundle (AAB)
        run: flutter build appbundle --release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v6
        with:
          name: android-apks
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab

  release:
    name: Create Release
    needs: [setup, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Android build
        uses: actions/download-artifact@v7
        with:
          name: android-apks
          path: artifacts

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.setup.outputs.tag }}
          name: ${{ needs.setup.outputs.release_name }}
          body: |
            ## Hikari Novel ${{ needs.setup.outputs.tag }}

            ### 🚀 新功能
            - 缓存的小说可导出为 .txt / .epub，支持自定义导出目录
            - 封面图片从第一章插画延迟加载高清图
            - 网格列数自定义（1-6列）
            - 列表/网格布局切换
            - 书架列表模式显示章节简介
            - Material Design 3 风格，适配平板布局
            - 深浅色模式切换
            - 阅读进度保存
            - 支持评论查看与回复

            ### 🐛 修复
            - 书架/首页封面不显示或模糊
            - 封面图片使用不存在的全尺寸图 → 改用缩略图（s 后缀）
            - Reader 控制器 debounce 优化，减少滚动卡顿
            - 缓存数量限制弹窗
            - CI: Node 20 弃用警告 → upload-artifact@v6, download-artifact@v7（Node 24）

            ### ⚙️ CI/CD
            - 新增 GitHub Actions 自动构建 + Release 工作流
            - 移除 Windows 构建（仅 Android 发布）
            - Docker 镜像构建（Android SDK + Flutter 3.38.7）

            ### 📦 下载
            - `app-armeabi-v7a-release.apk` — 32-bit ARM 设备
            - `app-arm64-v8a-release.apk` — 64-bit ARM 设备（推荐）
            - `app-x86_64-release.apk` — x86_64 模拟器 / 设备
            - `app-release.apk` — 通用 APK（所有架构）
            - `app-release.aab` — Android App Bundle
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
